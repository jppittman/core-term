[package]
name = "core-term"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
bitflags = { version = "2.9.0", features = ["serde"] }
env_logger = "0.11.8"
once_cell = "1.19.0" # Added for Lazy static initialization
libc = "0.2.172"
log = "0.4.27"
nix = { version = "0.30.0", features = ["term", "process", "fs", "ioctl", "signal"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
termios = "0.3.3"
yeslogic-fontconfig-sys = "6.0.0"

x11 = "2.21.0"

smithay-client-toolkit = "0.19.2"
wayland-client = "0.31.10"
# Add other Wayland-specific dependencies here if they arise, e.g. xkbcommon, wayland-protocols
# For now, based on the user's list, these are the primary ones.
# The build errors indicated wayland-protocols and xkbcommon might be needed by SCTK 0.19.2
# So, let's proactively add them under the wayland feature.
wayland-protocols = { version = "0.32.0", features = ["client", "unstable"] } # Common Wayland protocols
xkbcommon = { version = "0.8.0", features = ["wayland"] } # For keyboard handling with Wayland

# macOS specific dependencies (if any, currently none listed beyond common ones)
# [target.'cfg(target_os = "macos")'.dependencies]
# Example: cocoa = "0.24"
# Example: core-graphics = "0.22"

[build-dependencies]
pkg-config = "0.3.32"

[dev-dependencies]
test-log = "0.2.17"
rexpect = "0.6.1"
